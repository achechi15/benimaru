syntax = "proto3";

option go_package = "benimaru/gateway/internal/gen/profanity/v1;profanityv1";

package profanity.v1;

service ProfanityService {
  rpc AnalyzeText(AnalyzeTextRequest) returns (AnalyzeTextResponse);
  rpc AnalyzeImage(AnalyzeImageRequest) returns (AnalyzeImageResponse);
}

message AnalyzeTextRequest {
  string text = 1;
}

message AnalyzeTextResponse {
  map<string, double> probas = 1;
}

message AnalyzeImageRequest {
  string url = 1;
}

message AnalyzeImageResponse {
  bool profanity_check = 1;
}
