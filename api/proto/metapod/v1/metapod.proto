syntax = "proto3";

option go_package = "benimaru/gateway/internal/gen/metapod/v1;metapodv1";

package metapod.v1;

service MetapodService {
    rpc Create(CreateRequest) returns (CreateResponse);
}

message CreateRequest {
    string brand = 1;
    string channel = 2;
    string id = 3;
    string prompt = 4;
}

message CreateResponse {
    string status = 1;
    string id = 2;
}