# Levanta toda la plataforma:  docker compose up --build
#
# Variables: copia la plantilla y rellénala ->  cp .env.example .env
# El .env se carga automáticamente para sustituir ${VAR} y se inyecta en los
# contenedores vía 'env_file' (marcado required:false, así arranca sin .env).

services:
  llama:
    image: ghcr.io/ggml-org/llama.cpp:server
    volumes:
      - ./models:/models
    command: ["-m", "/models/${LLAMA_MODEL:-model.gguf}", "--host", "0.0.0.0", "--port", "8081", "--parallel", "5", "-c", "8192", "-ngl", "99"]
    restart: unless-stopped

  metapod:
    build:
      context: ./services/metapod
    env_file:
      - path: .env
        required: false
    environment:
      PYTHONUNBUFFERED: "1"
      GRPC_ADDR: "0.0.0.0:50051"
      LLAMA_URL: "http://llama:8081"
      CALLBACK_URL: "${CALLBACK_URL:-}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
    depends_on:
      - llama
    restart: unless-stopped

  profanity:
    build:
      context: ./services/profanity
    env_file:
      - path: .env
        required: false
    environment:
      PYTHONUNBUFFERED: "1"
      GRPC_ADDR: "0.0.0.0:50052"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
    restart: unless-stopped

  gateway:
    build:
      context: ./gateway
    env_file:
      - path: .env
        required: false
    environment:
      GATEWAY_ADDR: ":8080"
      GATEWAY_PROXY_TIMEOUT: "10s"
      VALKEY_SERVER_URL: "valkey:6379"
      GATEWAY_UPSTREAMS: >-
        [{"name":"metapod","prefix":"/v1/metapod","target":"metapod:50051"},
         {"name":"flowmetapod","prefix":"/flow/metapod","target":"metapod:50051"},
         {"name":"profanity","prefix":"/v1/profanity","target":"profanity:50052"}]
      GATEWAY_API_KEY: "${GATEWAY_API_KEY:-}"
    ports:
      - "8080:8080"
    depends_on:
      - metapod
      - profanity
      - valkey
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3

  valkey:
    image: valkey/valkey:8-alpine
    ports:
      - "6379:6379"
    volumes:
      - valkey-data:/data
    restart: unless-stopped

volumes:
  valkey-data:
